<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>SwapIt | Organizador de intercambio de regalos</title>

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

        <!-- Google Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
              rel="stylesheet">

        <link rel="stylesheet" href="CSS/priceStyles.css">
    </head>
    <body>
        <!-- Navbar  -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 sticky-top">
            <div class="container px-4">
                <a class="navbar-brand d-flex align-items-center" href="main.html">
                    <img src="Assets/logo.png" alt="Logo" width="35" class="me-2">
                    <span>SwapIt</span>
                </a>

                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto">
                    </ul>

                    <div class="navbar-nav">
                        <a href="#" class="nav-link d-flex align-items-center">
                            <i class="bi bi-headset me-2"></i> Soporte
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Date -->
        <section class="p-5 date-section" id="dateOfEvent">
            <div class="container-fluid">
                <div class="row gy-5 text-lg-center d-flex justify-content-center align-items-cente">
                    <div class="py-3 col-lg-4" id="content">
                        <h2 class=" mb-3 text-md-center">¿Cuando es el evento?</h2>
                        <div class="row d-flex justify-content-center">
                            <div class="mb-3 col-lg-2 text-lg-start">
                                <button class="btn custom-toggle mb-3 text-lg-start" type="button" aria-pressed="false" id="price1">
                                $200</button>
                            </div>

                            <div class="mb-3 col-lg-2 text-lg-start">
                                <button class="btn custom-toggle mb-3 text-lg-start" type="button" aria-pressed="false" id="price2">
                                $300</button>
                            </div>

                            <div class="mb-3 col-lg-2 text-lg-start">
                                <button class="btn custom-toggle mb-3 text-lg-start" type="button" aria-pressed="false" id="price3">
                                $500</button>
                            </div>

                            <div class="mb-3 col-lg-3 text-lg-start">
                                <button class="btn custom-toggle mb-3 text-lg-start" type="button" aria-pressed="false" id="diff">
                                    Other</button>
                            </div>
                        </div>
                        <div class="col-lg-4 mx-auto text-center" id="otherPrices" style="display: none">
                            <input id="priceCus" type="number" class="col-lg-12" placeholder="Ingresa el precio de tu evento">
                            <button onclick="getPrice()" id="price" class="btn w-100">Set Price</button>
                        </div>
                        <hr class="my-4">
                        <div class="mb-3 d-flex justify-content-between">
                            <a href="dateOfEvent.html" class="btn" id="goBack">
                                <i class="bi bi-arrow-left-square"></i>
                            </a>
                            <a class="btn btn-md" id="cont">Continuar
                                <i class="bi bi-arrow-right-circle"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="bg-dark text-white py-5 border-secondary">
            <div class="container px-5">
                <div class="row g-4 align-items-center">
                    <div class="col-md-4 text-center text-md-start">
                        <h5 class="fw-bold mb-2" style="color: rgb(175, 175, 175); letter-spacing: 2px;">SwapIt</h5>
                        <p class="small text-muted" style="color: rgb(175, 175, 175) !important; ">Organizador de
                            intercambio de regalos</p>
                    </div>
                </div>

                <hr class="my-4 border-secondary">

                <div class="row">
                    <div class="col-md-6 text-center text-md-start">
                        <p class="mb-0 small text-white-50">&copy; 2026. All rights reserved.
                        </p>
                    </div>
                    <div class="col-md-6 text-center text-md-end">
                        <p class="mb-0 text-secondary" style="font-size: 0.65rem; font-family: monospace;">
                            REGION: GLOBAL-ES | Author: Celia Fernanda Vela Uribe &
                            César Andrés Zuleta Malanco
                        </p>
                    </div>
                </div>
            </div>
        </footer>

        <!-- JS Script -->
        <script src="./scripts/priceScript.js"></script>
        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
