<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SwapIt | Resultados del Sorteo</title>
	<link rel="icon" type="image/x-icon" href="Assets/logo.png">

	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Bootstrap Icons -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<!-- Google Font -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
		rel="stylesheet">

	<!-- SweetAlert CDN -->
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<!-- CSS Stylesheet -->
	<link rel="stylesheet" href="CSS/sorteoStyles.css">
</head>

<body>
	<!-- Navbar  -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 sticky-top">
		<div class="container px-4">
			<a id="logo-ref" class="navbar-brand d-flex align-items-center" href="#">
				<img src="Assets/logo.png" alt="Logo" width="35" class="me-2">
				<span class="fw-bold">SwapIt</span>
			</a>
			<div class="ms-auto">
				<a href="#" class="nav-link text-white-50 small"><i class="bi bi-headset"></i> Soporte</a>
			</div>
		</div>
	</nav>

	<!-- Draw zone  -->
	<section class="py-4 py-md-5 px-2">
		<div class="container text-center">
			<h2 id="eventTitle" class="mb-4 mb-md-5 fw-bold text-uppercase" style="letter-spacing: 3px;"></h2>

			<p class="text-white-50 small text-uppercase mb-2" style="letter-spacing: 1px;">Tus Regalos</p>
			<div id="pairsContainer" class="d-flex flex-wrap justify-content-center gap-3 gap-md-4 mb-5 p-3 rounded"
				style="min-height: 180px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
			</div>

			<div id="revealZone"
				class="mx-auto border border-secondary rounded d-flex align-items-center justify-content-center p-3 p-md-5 w-100"
				style="max-width: 600px; min-height: 250px; position: relative;">
				<p id="instruction" class="text-white-50 m-0 text-uppercase small" style="letter-spacing: 2px;">
					Arrastra aquí para revelar
				</p>
			</div>

			<div class="d-grid d-md-flex justify-content-md-center gap-3 mt-5 mx-auto" style="max-width: 500px;">
				<button id="copyResults" class="btn btn-outline-light px-4 py-2">
					<i class="bi bi-clipboard me-2"></i> COPIAR RESULTADOS
				</button>
				<button id="downloadResults" class="btn btn-outline-light px-4 py-2">
					<i class="bi bi-file-earmark-arrow-down me-2"></i> DESCARGAR TXT
				</button>
			</div>
		</div>
	</section>

	<div class="home-button-container">
		<button id="btnReset" class="btn-home-elegant"><i class="bi bi-house-door"></i></button>
	</div>

	<div id="drag-ghost" style="position: absolute; top: -100px; width: 1px; height: 1px; pointer-events: none;"></div>

	<!-- Footer -->
	<footer class="bg-dark text-white py-3 border-secondary">
		<div class="container px-5">
			<div class="row g-4 align-items-center">
				<div class="col-md-4 text-center text-md-start">
					<h5 class="fw-bold mb-1" style="color: rgb(175, 175, 175); letter-spacing: 2px;">SwapIt</h5>
					<p class="small text-muted mb-1" style="color: rgb(175, 175, 175) !important; ">Organizador de
						intercambio de regalos</p>
				</div>
			</div>

			<hr class="my-4 border-secondary">

			<div class="row">
				<div class="col-md-6 text-center text-md-start">
					<p class="mb-0 small text-white-50" style="font-size: 0.8rem;">&copy; 2026. All rights reserved.
					</p>
				</div>
				<div class="col-md-6 text-center text-md-end">
					<p class="mb-0 text-secondary" style="font-size: 0.65rem; font-family: monospace;">
						REGION: GLOBAL-ES | Author: Celia Fernanda Vela Uribe &
						César Andrés Zuleta Malanco
					</p>
				</div>
			</div>
		</div>
	</footer>

	<!-- JS Script -->
	<script src="./scripts/sorteoScript.js"></script>

	<!-- Bootstrap JS Bundle -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
